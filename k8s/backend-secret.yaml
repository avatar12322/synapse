apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: synapse
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:postgres@postgres-svc:5432/synapse"
  REDIS_CONNECTION_STRING: "redis-svc:6379"
  JWT_SECRET: "REPLACE_WITH_MIN_256_BIT_SECRET"
  STRIPE_SECRET_KEY: "REPLACE_WITH_STRIPE_KEY"
  INTERNAL_API_SECRET: "REPLACE_WITH_32_CHAR_SECRET"
  EMBEDDING_ENCRYPTION_KEY: "REPLACE_WITH_64_HEX_CHARS_32_BYTES"
